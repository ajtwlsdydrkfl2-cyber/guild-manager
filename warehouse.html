<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>길드 창고 — 길드 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style id="commonStyle"></style>
<style>
.grade-section{margin-bottom:20px;}
.grade-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px 10px 0 0;font-weight:700;font-size:14px;}
.grade-body{border:1px solid;border-top:none;border-radius:0 0 10px 10px;padding:12px;}
.grade-myth .grade-header{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);}
.grade-myth .grade-body{border-color:rgba(239,68,68,.2);}
.grade-legend .grade-header{background:rgba(234,179,8,.15);color:#eab308;border:1px solid rgba(234,179,8,.3);}
.grade-legend .grade-body{border-color:rgba(234,179,8,.2);}
.grade-hero .grade-header{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3);}
.grade-hero .grade-body{border-color:rgba(168,85,247,.2);}
.grade-rare .grade-header{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3);}
.grade-rare .grade-body{border-color:rgba(59,130,246,.2);}
.grade-etc .grade-header{background:rgba(100,116,139,.1);color:#94a3b8;border:1px solid rgba(100,116,139,.2);}
.grade-etc .grade-body{border-color:rgba(100,116,139,.15);}
.item-grid{display:flex;flex-wrap:wrap;gap:8px;}
.item-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;background:var(--bg3);border:1px solid var(--border);}
.item-chip .qty{font-size:12px;font-weight:700;color:var(--accent);margin-left:2px;}
.empty-grade{color:var(--text2);font-size:13px;padding:4px 0;}
@media(max-width:768px){.item-chip{font-size:12px;padding:5px 10px;}.content{padding-bottom:100px!important;}}
</style>
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="sb-ov" id="sbOv" onclick="closeSb()"></div>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="ham" onclick="toggleSb()">☰</button>
        <div class="topbar-title">🏦 길드 창고</div>
      </div>
      <div id="adminBtns"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- 아이템 추가/수정 모달 -->
<div class="modal-ov" id="modal-item">
  <div class="modal">
    <div class="modal-title" id="itemModalTitle">📦 아이템 추가</div>
    <input type="hidden" id="item-id">
    <div class="fg">
      <label>등급</label>
      <select class="sel" id="item-grade" style="width:100%">
        <option value="myth">🔴 신화</option>
        <option value="legend">🟡 전설</option>
        <option value="hero">🟣 영웅</option>
        <option value="rare">🔵 희귀</option>
      </select>
    </div>
    <div class="fg"><label>아이템명</label><input class="inp" type="text" id="item-name" placeholder="예: 크란시아 목걸이"></div>
    <div class="fg"><label>수량</label><input class="inp" type="number" id="item-qty" value="1" min="0"></div>
    <div class="fg"><label>메모 (선택)</label><input class="inp" type="text" id="item-memo" placeholder="예: +15강"></div>
    <div class="modal-footer">
      <button class="btn btn-s" onclick="closeModal('item')">취소</button>
      <button class="btn btn-p" onclick="saveItem()">저장하기</button>
    </div>
  </div>
</div>

<!-- 일괄입력 모달 -->
<div class="modal-ov" id="modal-bulk">
  <div class="modal" style="max-width:520px">
    <div class="modal-title">📋 일괄 입력</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.7">
      한 줄에 하나씩 입력하세요.<br>
      형식: <span style="color:var(--accent)">아이템명 수량</span> (수량 없으면 1개로 등록)<br>
      같은 이름은 자동으로 합산됩니다.
    </div>
    <div class="fg">
      <label>등급</label>
      <select class="sel" id="bulk-grade" style="width:100%">
        <option value="myth">🔴 신화</option>
        <option value="legend">🟡 전설</option>
        <option value="hero">🟣 영웅</option>
        <option value="rare">🔵 희귀</option>
        </select>
    </div>
    <div class="fg">
      <label>아이템 목록</label>
      <textarea class="inp" id="bulk-text" rows="10" placeholder="엘 세라 귀걸이 2&#10;잿빛 여명 팔찌 2&#10;검은 가시 반지 1&#10;이니스 반지" style="width:100%;resize:vertical;line-height:1.8;font-size:13px"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-s" onclick="closeModal('bulk')">취소</button>
      <button class="btn btn-p" onclick="saveBulk()">일괄 등록</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script>
document.getElementById('commonStyle').textContent = COMMON_CSS;

const GRADES = [
  {key:'myth',   label:'신화', icon:'🔴', cls:'grade-myth'},
  {key:'legend', label:'전설', icon:'🟡', cls:'grade-legend'},
  {key:'hero',   label:'영웅', icon:'🟣', cls:'grade-hero'},
  {key:'rare',   label:'희귀', icon:'🔵', cls:'grade-rare'},
];

let warehouseItems = [];

window.addEventListener('load', () => {
  const sess = requireLogin(); if(!sess) return;
  initFirebase();
  watchServerName();
  renderSidebar('warehouse');

  if(isAdmin()) {
    document.getElementById('adminBtns').innerHTML = `
      <div style="display:flex;gap:6px">
        <button class="btn btn-s btn-sm" onclick="openModal('bulk')">📋 일괄입력</button>
        <button class="btn btn-p btn-sm" onclick="openAddItem()">+ 추가</button>
        <button class="btn btn-d btn-sm" onclick="clearAll()">🗑️ 전체삭제</button>
      </div>`;
  }

  fbListen('warehouseItems', data => {
    warehouseItems = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
    setData('warehouseItems', warehouseItems);
    renderWarehouse();
  });

  warehouseItems = getData('warehouseItems', []);
  renderWarehouse();
});

function renderWarehouse() {
  const admin = isAdmin();
  const total = warehouseItems.length;

  if(total === 0) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--text2)">
        <div style="font-size:40px;margin-bottom:12px">🏦</div>
        <div style="font-size:15px;margin-bottom:6px">창고가 비어있습니다</div>
        ${admin?'<div style="font-size:13px">오른쪽 상단 버튼으로 아이템을 추가해주세요</div>':''}
      </div>`;
    return;
  }

  let html = '';
  GRADES.forEach(g => {
    const items = warehouseItems
      .filter(i=>(i.grade||'etc')===g.key)
      .sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    if(items.length===0) return;

    html += `
      <div class="grade-section ${g.cls}">
        <div class="grade-header">
          ${g.icon} ${g.label}
          <span style="font-size:12px;font-weight:400;opacity:.7">${items.length}종 / 총 ${items.reduce((s,i)=>s+i.qty,0)}개</span>
        </div>
        <div class="grade-body">
          <div class="item-grid">
            ${items.map(item=>`
              <div class="item-chip">
                <span>${item.name}${item.memo?` <span style="font-size:11px;color:var(--text2)">(${item.memo})</span>`:''}</span>
                ${item.qty>1?`<span class="qty">×${item.qty}</span>`:''}
                ${admin?`<button onclick="openEditItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:12px;padding:0 2px">✏️</button>
                <button onclick="delItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:12px;padding:0 2px">✕</button>`:''}
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function openAddItem() {
  document.getElementById('itemModalTitle').textContent = '📦 아이템 추가';
  document.getElementById('item-id').value = '';
  document.getElementById('item-name').value = '';
  document.getElementById('item-qty').value = '1';
  document.getElementById('item-memo').value = '';
  document.getElementById('item-grade').value = 'legend';
  openModal('item');
}

function openEditItem(id) {
  const item = warehouseItems.find(x=>x.id===id); if(!item) return;
  document.getElementById('itemModalTitle').textContent = '✏️ 아이템 수정';
  document.getElementById('item-id').value = id;
  document.getElementById('item-name').value = item.name;
  document.getElementById('item-qty').value = item.qty;
  document.getElementById('item-memo').value = item.memo||'';
  document.getElementById('item-grade').value = item.grade||'legend';
  openModal('item');
}

function saveItem() {
  const id = document.getElementById('item-id').value;
  const name = document.getElementById('item-name').value.trim();
  if(!name) { showToast('아이템명을 입력해주세요','error'); return; }
  const qty = parseInt(document.getElementById('item-qty').value)||1;
  const grade = document.getElementById('item-grade').value;
  const memo = document.getElementById('item-memo').value.trim();

  if(id) {
    const item = warehouseItems.find(x=>x.id===parseInt(id)); if(!item) return;
    Object.assign(item, {name, qty, grade, memo});
  } else {
    // 같은 이름+등급 있으면 합산
    const existing = warehouseItems.find(x=>x.name===name&&x.grade===grade);
    if(existing) { existing.qty+=qty; }
    else {
      const newId = Math.max(0,...warehouseItems.map(x=>x.id),0)+1;
      warehouseItems.push({id:newId, name, qty, grade, memo});
    }
  }
  saveWarehouse();
  closeModal('item');
  showToast('저장됨!','success');
}

function delItem(id) {
  const item = warehouseItems.find(x=>x.id===id);
  if(!confirm(`"${item?.name}" 삭제?`)) return;
  warehouseItems = warehouseItems.filter(x=>x.id!==id);
  saveWarehouse();
  showToast('삭제됨');
}

function clearAll() {
  if(!confirm('창고 전체 삭제?')) return;
  warehouseItems = [];
  saveWarehouse();
  showToast('전체 삭제됨');
}

function saveBulk() {
  const text = document.getElementById('bulk-text').value.trim();
  const grade = document.getElementById('bulk-grade').value;
  if(!text) return;

  const lines = text.split('\n').filter(l=>l.trim());
  let added = 0;
  lines.forEach(line => {
    line = line.trim(); if(!line) return;
    const match = line.match(/^(.+?)\s+(\d+)$/);
    let name, qty;
    if(match) { name=match[1].trim(); qty=parseInt(match[2]); }
    else { name=line; qty=1; }
    if(!name) return;
    const existing = warehouseItems.find(x=>x.name===name&&x.grade===grade);
    if(existing) { existing.qty+=qty; }
    else {
      const newId = Math.max(0,...warehouseItems.map(x=>x.id),0)+1;
      warehouseItems.push({id:newId, name, qty, grade, memo:''});
    }
    added++;
  });

  saveWarehouse();
  closeModal('bulk');
  showToast(`${added}개 아이템 등록됨!`,'success');
}

function saveWarehouse() {
  setData('warehouseItems', warehouseItems);
  fbSet('warehouseItems', warehouseItems);
  renderWarehouse();
}

function openModal(n){document.getElementById('modal-'+n).classList.add('open');}
function closeModal(n){document.getElementById('modal-'+n).classList.remove('open');}
document.querySelectorAll('.modal-ov').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbOv').classList.toggle('open');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbOv').classList.remove('open');}
</script>
</body>
</html>
