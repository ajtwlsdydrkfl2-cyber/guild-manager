<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로드나인마블 — 길드 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style id="commonStyle"></style>
<style>
body,html{height:100%;overflow:hidden;}
.board-wrap{display:flex;flex-direction:column;height:100vh;}
.board-topbar{padding:8px 16px;background:rgba(8,12,20,.97);border-bottom:1px solid rgba(240,165,0,.2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.board-body{flex:1;display:flex;overflow:hidden;}
.stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:10px;}
.board-stage{position:relative;background:radial-gradient(ellipse at center,#0d1a2e 0%,#060a12 100%);border-radius:12px;border:2px solid rgba(240,165,0,.25);box-shadow:0 0 60px rgba(240,165,0,.1),inset 0 0 60px rgba(0,0,0,.5);}

/* 타일 */
.tile{position:absolute;border-radius:8px;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;cursor:default;transition:transform .15s;box-sizing:border-box;}
.tile:hover{transform:scale(1.06);z-index:15;}
.tile img{width:100%;height:100%;object-fit:cover;border-radius:6px;}
.tile-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.82);font-size:0;font-weight:700;text-align:center;padding:1px 2px;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tile-num{position:absolute;top:2px;left:3px;font-weight:700;color:rgba(255,255,255,.85);}
.tile-icon{font-size:22px;}
.tile-start{border-color:#22c55e;background:rgba(34,197,94,.15);box-shadow:0 0 12px rgba(34,197,94,.3);}
.tile-boss{border-color:#a855f7;box-shadow:0 0 8px rgba(168,85,247,.2);}
.tile-card{border-color:#f0a500;background:rgba(240,165,0,.15);}
.tile-reward{border-color:#14b8a6;background:rgba(20,184,166,.12);}
.tile-move{border-color:#3b82f6;background:rgba(59,130,246,.12);}
.tile-trap{border-color:#ef4444;background:rgba(239,68,68,.12);}

/* 중앙 */
.center-area{position:absolute;background:rgba(5,9,18,.85);border-radius:14px;border:1px solid rgba(240,165,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;}
.final-img{object-fit:cover;border-radius:10px;border:2px solid rgba(240,165,0,.3);}
.boss-title{font-family:'Black Han Sans',sans-serif;color:#f0a500;text-align:center;}
.hp-bar-wrap{background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f0a500);border-radius:4px;transition:width .3s;}
.die{border-radius:8px;background:linear-gradient(135deg,#1a2a40,#0e1520);border:2px solid #f0a500;display:flex;align-items:center;justify-content:center;font-weight:900;color:#f0a500;font-family:'Black Han Sans',sans-serif;box-shadow:0 0 12px rgba(240,165,0,.25);}
.roll-btn{border-radius:8px;background:linear-gradient(180deg,#a855f7,#5b21b6);color:#fff3bf;font-weight:700;border:2px solid #f5d879;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 12px rgba(168,85,247,.35);transition:all .15s;}
.roll-btn:hover{filter:brightness(1.2);}
.roll-btn:disabled{opacity:.5;cursor:default;}

/* 말 */
.piece{position:absolute;border-radius:50%;z-index:20;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.8);box-shadow:0 0 8px rgba(255,255,255,.4);transition:left .5s ease,top .5s ease;background:rgba(0,0,0,.5);pointer-events:none;}

/* 우측 패널 */
.board-right{width:220px;background:rgba(8,12,20,.97);border-left:1px solid rgba(240,165,0,.12);overflow-y:auto;padding:10px;flex-shrink:0;}
.panel-title{font-size:10px;font-weight:700;color:rgba(240,165,0,.5);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;margin-top:12px;padding-bottom:4px;border-bottom:1px solid rgba(30,45,69,.5);}
.player-card{background:rgba(20,32,50,.6);border:1px solid rgba(30,45,69,.8);border-radius:8px;padding:8px;margin-bottom:6px;}
.player-card.me{border-color:rgba(240,165,0,.4);}
.p-items{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.p-item{font-size:9px;background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);border-radius:3px;padding:1px 4px;color:#f0a500;}
.rank-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(30,45,69,.3);}
.rank-row:last-child{border-bottom:none;}

/* 팝업 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:100;}
.overlay.open{display:flex;}
.pop-box{background:#0a0f1a;border:2px solid #f0a500;border-radius:16px;padding:24px;text-align:center;width:min(320px,88vw);}

/* 최종 보스 */
.final-screen{position:fixed;inset:0;background:rgba(0,0,0,.96);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:150;padding:20px;}
.final-screen.open{display:flex;}
.final-boss-img{width:150px;height:150px;object-fit:cover;border-radius:14px;border:3px solid #f0a500;box-shadow:0 0 40px rgba(240,165,0,.4);margin-bottom:12px;}
.final-die{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,#1a2a40,#0e1520);border:3px solid #f0a500;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#f0a500;font-family:'Black Han Sans',sans-serif;}
.rank-box{background:#080c14;border:1px solid rgba(30,45,69,.8);border-radius:10px;padding:12px;width:300px;}

/* 토스트 */
.b-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-60px);background:rgba(5,9,18,.97);border:2px solid #f0a500;border-radius:10px;padding:9px 20px;font-size:13px;font-weight:700;color:#f0a500;z-index:300;transition:transform .3s;white-space:nowrap;box-shadow:0 6px 25px rgba(240,165,0,.2);}
.b-toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:768px){.board-right{display:none;}}
</style>
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="sb-ov" id="sbOv" onclick="closeSb()"></div>
  <div class="main" style="overflow:hidden;height:100vh">
    <div class="board-wrap">
      <div class="board-topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="ham" onclick="toggleSb()">☰</button>
          <span style="font-family:'Black Han Sans',sans-serif;font-size:16px;color:#f0a500">🎲 로드나인마블</span>
          <span id="seasonTimer" style="font-size:11px;color:#64748b"></span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="myInfo" style="font-size:12px;color:#14b8a6"></span>
          <button class="btn btn-s btn-sm" onclick="openNickModal()">👤 캐릭터</button>
          <span id="adminBtn"></span>
        </div>
      </div>
      <div class="board-body">
        <div class="stage-wrap" id="stageWrap">
          <div class="board-stage" id="boardStage">
            <div id="tilesContainer"></div>
            <div class="center-area" id="centerArea">
              <img class="final-img" id="centerBossImg" src="final_boss.png">
              <div class="boss-title" id="centerBossName">최종 보스 셀페리온</div>
              <div class="hp-bar-wrap" id="centerHpBar"><div class="hp-bar-fill" id="centerHpFill" style="width:100%"></div></div>
              <div style="font-size:10px;color:#64748b;margin:3px 0" id="centerDmgText">누적 데미지: 0</div>
              <div style="display:flex;gap:8px;margin:4px 0">
                <div class="die" id="die1">?</div>
                <div class="die" id="die2">?</div>
              </div>
              <div style="font-size:10px;color:#64748b;margin:3px 0" id="diceRemain">오늘 남은 주사위: 3회</div>
              <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 주사위 굴리기</button>
            </div>
            <div id="piecesContainer"></div>
          </div>
        </div>
        <div class="board-right">
          <div class="panel-title">플레이어 현황</div>
          <div id="playerPanel"></div>
          <div class="panel-title">🐉 데미지 랭킹</div>
          <div id="dmgRanking"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 이벤트 카드 -->
<div class="overlay" id="cardOverlay">
  <div class="pop-box">
    <div style="font-size:48px;margin-bottom:10px" id="cardIcon"></div>
    <div style="font-size:17px;font-weight:700;color:#f0a500;margin-bottom:6px" id="cardTitle"></div>
    <div style="font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:18px" id="cardDesc"></div>
    <button class="btn btn-p" onclick="closeCard()" style="width:100%">확인</button>
  </div>
</div>

<!-- 최종 보스 화면 -->
<div class="final-screen" id="finalScreen">
  <button onclick="closeFinal()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:#64748b;font-size:22px;cursor:pointer">✕</button>
  <img class="final-boss-img" src="final_boss.png">
  <div style="font-family:'Black Han Sans',sans-serif;font-size:22px;color:#f0a500;margin-bottom:8px">최종 보스 셀페리온</div>
  <div style="width:360px;height:12px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;margin-bottom:4px"><div class="hp-bar-fill" id="finalHpFill" style="width:100%;height:100%"></div></div>
  <div style="font-size:12px;color:#64748b;margin-bottom:16px" id="finalDmgText">누적 데미지: 0</div>
  <div style="display:flex;gap:14px;margin-bottom:14px">
    <div class="final-die" id="finalDie1">?</div>
    <div class="final-die" id="finalDie2">?</div>
  </div>
  <div style="font-size:36px;font-weight:900;color:#ef4444;text-shadow:0 0 20px rgba(239,68,68,.7);margin-bottom:10px;display:none" id="finalDmgAnim"></div>
  <div class="rank-box" style="margin-bottom:14px">
    <div style="font-size:12px;font-weight:700;color:#f0a500;margin-bottom:8px">🏆 데미지 랭킹</div>
    <div id="finalRanking"></div>
  </div>
  <button class="roll-btn" id="finalRollBtn" onclick="finalAttack()" style="font-size:15px;padding:12px 32px">⚔️ 보스 공격!</button>
</div>

<!-- 관리자 모달 -->
<div class="modal-ov" id="modal-admin">
  <div class="modal" style="max-width:460px">
    <div class="modal-title">⚙️ 로드나인마블 관리자</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px">보스/보상 칸 아이템 설정</div>
    <div id="tileSettings" style="max-height:300px;overflow-y:auto"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-d btn-sm" onclick="if(confirm('전체 초기화?'))resetBoard()">🔄 전체 초기화</button>
      <button class="btn btn-d btn-sm" onclick="if(confirm('데미지만 초기화?'))resetDamage()">💥 데미지 초기화</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-s" onclick="closeModal('admin')">닫기</button>
      <button class="btn btn-p" onclick="saveTileSettings()">저장</button>
    </div>
  </div>
</div>

<!-- 닉네임 모달 -->
<div class="modal-ov" id="modal-nick">
  <div class="modal">
    <div class="modal-title">🎲 캐릭터 선택</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:12px">닉네임 선택 시 이모티콘이 랜덤 배정됩니다!</div>
    <div class="fg"><label>닉네임</label><select class="sel" id="boardNick" style="width:100%"><option value="">선택하세요</option></select></div>
    <div class="modal-footer"><button class="btn btn-p" style="width:100%" onclick="confirmNick()">시작하기!</button></div>
  </div>
</div>

<div class="b-toast" id="bToast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script>
document.getElementById('commonStyle').textContent = COMMON_CSS;

// ===== 타일 정의 (28칸 = 4모서리 + 각 변 6칸) =====
// 배치: 상단(0-7) → 우측(8-13) → 하단(14-21) → 좌측(22-27)
const TILE_DEFS = [
  // 상단 좌→우 (0-7)
  {type:'start',  name:'START',        icon:'🏁'},
  {type:'boss',   name:'베나투스',     img:'boss_00.png'},
  {type:'card',   name:'특수카드',     icon:'❓'},
  {type:'boss',   name:'클레멘티스',   img:'boss_01.png'},
  {type:'reward', name:'보급상자',     icon:'🎁'},
  {type:'boss',   name:'레이디달리아', img:'boss_02.png'},
  {type:'move',   name:'앞으로3칸',    icon:'➜'},
  {type:'boss',   name:'아쿨레우스',   img:'boss_03.png'},
  // 우측 상→하 (8-13)
  {type:'card',   name:'추가주사위',   icon:'🎲'},
  {type:'boss',   name:'아멘티스',     img:'boss_04.png'},
  {type:'trap',   name:'함정',         icon:'⚠️'},
  {type:'boss',   name:'밀라베',       img:'boss_05.png'},
  {type:'reward', name:'강화석',       icon:'💎'},
  {type:'boss',   name:'세크레타',     img:'boss_06.png'},
  // 하단 우→좌 (14-21)
  {type:'card',   name:'공격강화',     icon:'⚔️'},
  {type:'boss',   name:'카테나',       img:'boss_07.png'},
  {type:'trap',   name:'위험지대',     icon:'☠️'},
  {type:'boss',   name:'링고르',       img:'boss_08.png'},
  {type:'reward', name:'회복물약',     icon:'✚'},
  {type:'boss',   name:'알시',         img:'boss_09.png'},
  {type:'card',   name:'특수카드',     icon:'❓'},
  {type:'boss',   name:'네바',         img:'boss_10.png'},
  // 좌측 하→상 (22-27)
  {type:'reward', name:'보급상자',     icon:'🎁'},
  {type:'boss',   name:'루쿠스',       img:'boss_11.png'},
  {type:'card',   name:'약점공격',     icon:'⚔️'},
  {type:'trap',   name:'뒤로2칸',      icon:'↶'},
  {type:'reward', name:'제작재료',     icon:'◇'},
  {type:'gold',   name:'골드획득',     icon:'⭐'},
];

// 보드 구조: SIDE=6 (각 변에 모서리 포함 8칸)
// 총 28칸: 상(8) + 우(6) + 하(8) + 좌(6)
const SIDE = 6; // 모서리 사이 칸 수
const N = TILE_DEFS.length; // 28

const EMOJIS=['🐱','🐶','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🦆','🦉','🦋'];

const EVENT_CARDS=[
  {icon:'⚔️',title:'보스 추가 공격',desc:'최종 보스에게 추가 데미지 50,000!',type:'extra_dmg',value:50000},
  {icon:'💥',title:'공격력 2배',desc:'다음 최종 보스 공격 데미지 2배!',type:'double_atk'},
  {icon:'🎲',title:'주사위 추가',desc:'오늘 주사위 1회 추가!',type:'extra_dice'},
  {icon:'🛡️',title:'방어권',desc:'강탈/교환 1회 거부 가능!',type:'shield'},
  {icon:'🃏',title:'강탈',desc:'길드원 1명 아이템 1개 가져오기!',type:'steal'},
  {icon:'🍀',title:'행운',desc:'현재 칸 아이템 2배!',type:'lucky'},
  {icon:'⏩',title:'앞으로 점프',desc:'주사위 없이 3칸 앞으로!',type:'jump',value:3},
  {icon:'☠️',title:'저주',desc:'다음 주사위 이동칸 절반!',type:'curse'},
  {icon:'🎁',title:'깜짝 선물',desc:'보너스 아이템 획득!',type:'gift'},
];

const BOSS_HP=999999999;
let boardData={}, members=[], myNick=localStorage.getItem('gm_boardNick')||'', myEmoji=localStorage.getItem('gm_boardEmoji')||'';
let cardCb=null;
let TW=80; // 타일 크기 (정사각형)

window.addEventListener('load',()=>{
  const sess=requireLogin(); if(!sess) return;
  initFirebase(); watchServerName(); renderSidebar('board');
  if(isAdmin()) document.getElementById('adminBtn').innerHTML=`<button class="btn btn-s btn-sm" onclick="openAdmin()">⚙️ 관리</button>`;
  members=getData('members',[]);
  fbListen('members',d=>{if(d) members=Array.isArray(d)?d:Object.values(d);});
  fbListen('boardData',d=>{boardData=d||{}; renderPieces(); renderPlayerPanel(); renderDmgRanking(); updateMyUI();});
  boardData=getData('boardData',{});
  resizeBoard();
  window.addEventListener('resize',resizeBoard);
  if(!myNick) setTimeout(openNickModal,400);
  else updateMyUI();
  updateTimer(); setInterval(updateTimer,1000);
});

// ===== 타일 위치 계산 (완벽한 사각형) =====
// 상단: 0~7 (좌→우), 우측: 8~13 (상→하), 하단: 14~21 (우→좌), 좌측: 22~27 (하→상)
function getTileXY(i) {
  const cols = SIDE+2; // 8 (상하 타일 개수)
  const rows = SIDE+2; // 8 (좌우 타일 개수)
  // 상단 (0 ~ cols-1)
  if(i < cols) return {x: i*TW, y: 0};
  // 우측 (cols ~ cols+SIDE-1)
  if(i < cols+SIDE) return {x: (cols-1)*TW, y: (i-cols+1)*TW};
  // 하단 (cols+SIDE ~ cols*2+SIDE-1)
  if(i < cols*2+SIDE) return {x: (cols*2+SIDE-1-i)*TW, y: (rows-1)*TW};
  // 좌측 (cols*2+SIDE ~ ...)
  return {x: 0, y: (N-i)*TW};
}

function resizeBoard() {
  const wrap=document.getElementById('stageWrap');
  const W=wrap.clientWidth-20, H=wrap.clientHeight-20;
  const cols=SIDE+2; // 8
  // 타일 크기: 화면에 맞게
  TW=Math.floor(Math.min(W/cols, H/cols));
  TW=Math.max(48, Math.min(TW, 90));
  const bSize=(cols)*TW;
  const stage=document.getElementById('boardStage');
  stage.style.width=bSize+'px'; stage.style.height=bSize+'px';
  // 중앙 영역
  const ca=document.getElementById('centerArea');
  const cStart=TW, cSize=(cols-2)*TW;
  ca.style.cssText=`position:absolute;left:${cStart}px;top:${cStart}px;width:${cSize}px;height:${cSize}px;background:rgba(5,9,18,.85);border-radius:14px;border:1px solid rgba(240,165,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;`;
  // 다이 크기
  const ds=Math.max(28,Math.min(42,TW*.5));
  document.querySelectorAll('.die').forEach(d=>{d.style.width=ds+'px';d.style.height=ds+'px';d.style.fontSize=(ds*.6)+'px';});
  document.getElementById('centerBossImg').style.cssText=`width:${Math.min(90,cSize*.38)}px;height:${Math.min(90,cSize*.35)}px;object-fit:cover;border-radius:10px;border:2px solid rgba(240,165,0,.3);margin-bottom:5px;`;
  document.getElementById('centerBossName').style.fontSize=Math.max(10,TW*.15)+'px';
  document.getElementById('centerHpBar').style.cssText=`width:${cSize*.72}px;height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-bottom:3px;`;
  document.getElementById('rollBtn').style.cssText=`border-radius:8px;background:linear-gradient(180deg,#a855f7,#5b21b6);color:#fff3bf;font-weight:700;border:2px solid #f5d879;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:${Math.max(10,TW*.14)}px;padding:${TW*.07}px ${TW*.18}px;margin-top:5px;`;
  renderTiles();
  renderPieces();
}

function renderTiles() {
  const container=document.getElementById('tilesContainer');
  container.innerHTML=TILE_DEFS.map((t,i)=>{
    const {x,y}=getTileXY(i);
    const fs=Math.max(6,TW*.1)+'px';
    const ns=Math.max(7,TW*.1)+'px';
    const inner=t.img
      ?`<img src="${t.img}" style="width:100%;height:100%;object-fit:cover;border-radius:6px" onerror="this.style.display='none'">`
      :`<span style="font-size:${Math.max(18,TW*.28)}px">${t.icon}</span>`;
    return `<div class="tile tile-${t.type}" style="left:${x}px;top:${y}px;width:${TW}px;height:${TW}px" title="${t.name}">
      ${inner}
      <div class="tile-label" style="font-size:${fs}">${t.name}</div>
      <div class="tile-num" style="font-size:${ns}">${String(i+1).padStart(2,'0')}</div>
    </div>`;
  }).join('');
}

function renderPieces() {
  const container=document.getElementById('piecesContainer');
  container.innerHTML='';
  const cnt={};
  Object.entries(boardData).filter(([k])=>k!=='_totalDmg'&&k!=='tileItems').forEach(([nick,pd])=>{
    if(!pd||pd.pos===undefined) return;
    const idx=pd.pos%N;
    const {x,y}=getTileXY(idx);
    const c=cnt[idx]=(cnt[idx]||0);
    cnt[idx]++;
    const sz=Math.max(20,TW*.3);
    const off=c*12;
    const el=document.createElement('div');
    el.className='piece';
    el.textContent=pd.emoji||'🐱'; el.title=nick;
    el.style.cssText=`left:${x+TW/2-sz/2+off}px;top:${y+TW/2-sz/2+off}px;width:${sz}px;height:${sz}px;font-size:${sz*.65}px;${nick===myNick?'box-shadow:0 0 12px gold;border-color:gold;':''}`;
    container.appendChild(el);
  });
}

// ===== 주사위 =====
function rollDice() {
  if(!myNick){openNickModal();return;}
  const today=new Date().toDateString();
  const pd=boardData[myNick]||{};
  const rollsLeft=pd.lastRollDate===today?(pd.rollsLeft??3):3;
  if(rollsLeft<=0){showToast('오늘 주사위를 모두 사용했어요!');return;}
  const btn=document.getElementById('rollBtn');
  btn.disabled=true;
  let cnt=0;
  const iv=setInterval(()=>{
    document.getElementById('die1').textContent=Math.floor(Math.random()*6)+1;
    document.getElementById('die2').textContent=Math.floor(Math.random()*6)+1;
    if(++cnt>=14){
      clearInterval(iv);
      const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1;
      document.getElementById('die1').textContent=d1;
      document.getElementById('die2').textContent=d2;
      btn.disabled=false;
      doMove(d1+d2,d1,d2);
    }
  },70);
}

function doMove(move,d1,d2) {
  const today=new Date().toDateString();
  const pd=boardData[myNick]||{pos:0,items:{},dmg:0,completed:false,emoji:myEmoji};
  const rollsLeft=pd.lastRollDate===today?(pd.rollsLeft??3):3;
  const prevLaps=Math.floor((pd.pos||0)/N);
  pd.pos=(pd.pos||0)+move;
  pd.rollsLeft=rollsLeft-1;
  pd.lastRollDate=today;
  pd.emoji=myEmoji;
  const tileIdx=pd.pos%N;
  const tile=TILE_DEFS[tileIdx];
  const newLaps=Math.floor(pd.pos/N);
  const justCompleted=newLaps>prevLaps;
  showToast(`🎲 ${d1}+${d2}=${move} → ${tile.name} 도착!`);
  const tileItem=(boardData.tileItems||{})[tileIdx];
  if((tile.type==='boss'||tile.type==='reward'||tile.type==='gold')&&tileItem){
    if(!pd.items) pd.items={};
    pd.items[tileItem]=(pd.items[tileItem]||0)+1;
    setTimeout(()=>showToast(`🎁 ${tileItem} 획득!`),1000);
  }
  if(tile.type==='card') setTimeout(()=>triggerCard(pd),1200);
  if(tile.type==='move'&&tile.name.includes('앞')){const n=parseInt(tile.name.match(/\d+/)?.[0]||2);pd.pos+=n;setTimeout(()=>showToast(`➜ ${n}칸 추가!`),1200);}
  if(tile.type==='trap'){
    if(tile.name.includes('뒤')){const n=parseInt(tile.name.match(/\d+/)?.[0]||2);pd.pos=Math.max(0,pd.pos-n);setTimeout(()=>showToast(`↶ ${n}칸 뒤로!`),1200);}
    else{pd.cursed=true;setTimeout(()=>showToast('☠️ 저주! 다음 주사위 절반!'),1200);}
  }
  if(justCompleted){pd.completed=true;setTimeout(()=>{showToast('🎉 한 바퀴 완주! 최종 보스 공격 가능!');openFinalBoss();},1800);}
  if(!boardData[myNick]) boardData[myNick]={};
  Object.assign(boardData[myNick],pd);
  saveBoardData(); updateMyUI();
}

// ===== 이벤트 카드 =====
function triggerCard(pd) {
  const card=EVENT_CARDS[Math.floor(Math.random()*EVENT_CARDS.length)];
  document.getElementById('cardIcon').textContent=card.icon;
  document.getElementById('cardTitle').textContent=card.title;
  document.getElementById('cardDesc').textContent=card.desc;
  document.getElementById('cardOverlay').classList.add('open');
  cardCb=()=>{
    if(card.type==='extra_dice'){pd.rollsLeft=(pd.rollsLeft||0)+1;Object.assign(boardData[myNick],pd);saveBoardData();updateMyUI();}
    if(card.type==='extra_dmg') addFinalDmg(card.value);
    if(card.type==='jump'){pd.pos+=(card.value||3);Object.assign(boardData[myNick],pd);saveBoardData();}
    if(card.type==='shield'){pd.shield=(pd.shield||0)+1;Object.assign(boardData[myNick],pd);saveBoardData();}
  };
}
function closeCard(){document.getElementById('cardOverlay').classList.remove('open');if(cardCb){cardCb();cardCb=null;}}

// ===== 최종 보스 =====
function openFinalBoss(){updateFinalRanking();const total=boardData._totalDmg||0;document.getElementById('finalHpFill').style.width=Math.max(0,100-total/BOSS_HP*100)+'%';document.getElementById('finalDmgText').textContent='누적 데미지: '+total.toLocaleString();document.getElementById('finalScreen').classList.add('open');}
function closeFinal(){document.getElementById('finalScreen').classList.remove('open');}

function finalAttack(){
  const pd=boardData[myNick];
  if(!pd?.completed){showToast('한 바퀴 완주 후 공격 가능해요!');return;}
  const btn=document.getElementById('finalRollBtn');
  btn.disabled=true;
  let cnt=0;
  const iv=setInterval(()=>{
    document.getElementById('finalDie1').textContent=Math.floor(Math.random()*6)+1;
    document.getElementById('finalDie2').textContent=Math.floor(Math.random()*6)+1;
    if(++cnt>=16){
      clearInterval(iv);
      const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1;
      document.getElementById('finalDie1').textContent=d1;
      document.getElementById('finalDie2').textContent=d2;
      let dmg=(d1+d2)*10000;
      if(pd.doubleAtk){dmg*=2;pd.doubleAtk=false;}
      addFinalDmg(dmg);
      const el=document.getElementById('finalDmgAnim');
      el.style.display='block';el.textContent=dmg.toLocaleString()+' DAMAGE!';
      setTimeout(()=>{el.style.display='none';btn.disabled=false;},2000);
      updateFinalRanking();
    }
  },75);
}

function addFinalDmg(dmg){
  if(!boardData[myNick]) boardData[myNick]={};
  boardData[myNick].dmg=(boardData[myNick].dmg||0)+dmg;
  const total=Object.entries(boardData).filter(([k])=>k!=='_totalDmg'&&k!=='tileItems').reduce((s,[,p])=>s+(p.dmg||0),0);
  boardData._totalDmg=total;
  saveBoardData();
  const pct=Math.max(0,100-total/BOSS_HP*100);
  document.getElementById('finalHpFill').style.width=pct+'%';
  document.getElementById('finalDmgText').textContent='누적 데미지: '+total.toLocaleString();
  document.getElementById('centerHpFill').style.width=pct+'%';
  document.getElementById('centerDmgText').textContent='누적 데미지: '+total.toLocaleString();
}

function updateFinalRanking(){
  const p=Object.entries(boardData).filter(([k,v])=>k!=='_totalDmg'&&k!=='tileItems'&&v?.dmg>0).sort((a,b)=>b[1].dmg-a[1].dmg);
  document.getElementById('finalRanking').innerHTML=p.length===0?'<div style="color:#64748b;font-size:12px">아직 공격자 없음</div>':p.map(([nick,pd],i)=>`<div class="rank-row" style="${i===0?'color:#f0a500;font-weight:700':''}"><span>${i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`} ${pd.emoji||''} ${nick}</span><span style="color:#ef4444">${(pd.dmg||0).toLocaleString()}</span></div>`).join('');
}

// ===== UI =====
function updateMyUI(){
  if(!myNick) return;
  const today=new Date().toDateString();
  const pd=boardData[myNick]||{};
  const r=pd.lastRollDate===today?(pd.rollsLeft??3):3;
  document.getElementById('diceRemain').textContent=`오늘 남은 주사위: ${r}회`;
  document.getElementById('rollBtn').disabled=r<=0;
  document.getElementById('myInfo').textContent=`${myEmoji} ${myNick} · ${r}회`;
  const total=boardData._totalDmg||0;
  document.getElementById('centerHpFill').style.width=Math.max(0,100-total/BOSS_HP*100)+'%';
  document.getElementById('centerDmgText').textContent='누적 데미지: '+total.toLocaleString();
}

function renderPlayerPanel(){
  const sorted=Object.entries(boardData).filter(([k])=>k!=='_totalDmg'&&k!=='tileItems').sort((a,b)=>(b[1].pos||0)-(a[1].pos||0));
  document.getElementById('playerPanel').innerHTML=sorted.map(([nick,pd])=>{
    const tile=TILE_DEFS[(pd.pos||0)%N];
    const laps=Math.floor((pd.pos||0)/N);
    const items=Object.entries(pd.items||{}).map(([k,v])=>`${k}×${v}`);
    return `<div class="player-card${nick===myNick?' me':''}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span style="font-size:18px">${pd.emoji||'🐱'}</span>
        <div><div style="font-size:12px;font-weight:700">${nick}${nick===myNick?' (나)':''}</div>
        <div style="font-size:10px;color:#64748b">${laps>0?laps+'바퀴+':''}${tile?.name||''}${pd.completed?' ✅':''}</div></div>
      </div>
      ${pd.dmg>0?`<div style="font-size:10px;color:#ef4444">💥 ${(pd.dmg||0).toLocaleString()}</div>`:''}
      ${items.length>0?`<div class="p-items">${items.map(i=>`<span class="p-item">${i}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('')||'<div style="color:#64748b;font-size:12px">아직 참여자 없음</div>';
}

function renderDmgRanking(){
  const p=Object.entries(boardData).filter(([k,v])=>k!=='_totalDmg'&&k!=='tileItems'&&v?.dmg>0).sort((a,b)=>b[1].dmg-a[1].dmg);
  document.getElementById('dmgRanking').innerHTML=p.map(([nick,pd],i)=>`<div class="rank-row" style="${nick===myNick?'color:#f0a500':''}"><span>${i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`} ${pd.emoji||''} ${nick}</span><span style="color:#ef4444;font-weight:700">${(pd.dmg||0).toLocaleString()}</span></div>`).join('')||'<div style="color:#64748b;font-size:11px">아직 없음</div>';
}

function updateTimer(){
  const now=new Date(),d=7-now.getDay(),target=new Date(now);
  target.setDate(now.getDate()+(d===7?0:d));target.setHours(23,59,0,0);
  const diff=target-now,days=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById('seasonTimer').textContent=`시즌 종료 ${days}일 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ===== 닉네임 =====
function openNickModal(){
  const sel=document.getElementById('boardNick');
  sel.innerHTML='<option value="">선택하세요</option>';
  [...members].sort((a,b)=>a.nick.localeCompare(b.nick,'ko')).forEach(m=>{sel.innerHTML+=`<option value="${m.nick}"${m.nick===myNick?' selected':''}>${m.nick}</option>`;});
  openModal('nick');
}
function confirmNick(){
  const nick=document.getElementById('boardNick').value;
  if(!nick){showToast('닉네임을 선택해주세요!');return;}
  myNick=nick;localStorage.setItem('gm_boardNick',nick);
  if(boardData[nick]?.emoji){myEmoji=boardData[nick].emoji;}
  else{const used=Object.values(boardData).map(p=>p.emoji).filter(Boolean);const avail=EMOJIS.filter(e=>!used.includes(e));myEmoji=avail.length>0?avail[Math.floor(Math.random()*avail.length)]:EMOJIS[Math.floor(Math.random()*EMOJIS.length)];}
  localStorage.setItem('gm_boardEmoji',myEmoji);
  if(!boardData[nick]){boardData[nick]={pos:0,emoji:myEmoji,items:{},dmg:0,completed:false,rollsLeft:3,lastRollDate:''};saveBoardData();}
  closeModal('nick');updateMyUI();showToast(`${myEmoji} ${nick}님 환영합니다!`);
}

// ===== 관리자 =====
function openAdmin(){
  const tileItems=boardData.tileItems||{};
  document.getElementById('tileSettings').innerHTML=TILE_DEFS.map((t,i)=>{
    if(!['boss','reward','gold'].includes(t.type)) return '';
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span style="font-size:11px;color:#14b8a6;min-width:90px">${t.name}</span><input class="inp" type="text" value="${tileItems[i]||''}" placeholder="아이템명" id="ti_${i}" style="flex:1;padding:4px 8px;font-size:11px"></div>`;
  }).join('');
  openModal('admin');
}
function saveTileSettings(){if(!boardData.tileItems)boardData.tileItems={};TILE_DEFS.forEach((_,i)=>{const el=document.getElementById(`ti_${i}`);if(el)boardData.tileItems[i]=el.value.trim();});saveBoardData();closeModal('admin');showToast('저장됐어요!');}
function resetBoard(){const ti=boardData.tileItems;boardData={tileItems:ti};saveBoardData();myNick='';myEmoji='';localStorage.removeItem('gm_boardNick');localStorage.removeItem('gm_boardEmoji');location.reload();}
function resetDamage(){Object.keys(boardData).forEach(k=>{if(k!=='_totalDmg'&&k!=='tileItems'&&boardData[k])boardData[k].dmg=0;});boardData._totalDmg=0;saveBoardData();showToast('데미지 초기화!');}
function saveBoardData(){setData('boardData',boardData);fbSet('boardData',boardData);renderPieces();renderPlayerPanel();renderDmgRanking();}

function showToast(msg){const el=document.getElementById('bToast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2500);}
function openModal(n){document.getElementById('modal-'+n).classList.add('open');}
function closeModal(n){document.getElementById('modal-'+n).classList.remove('open');}
document.querySelectorAll('.modal-ov').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbOv').classList.toggle('open');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbOv').classList.remove('open');}
</script>
