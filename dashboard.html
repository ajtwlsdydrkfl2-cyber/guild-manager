<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>대시보드 — 길드 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style id="commonStyle"></style>
<style>
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc-gold::before{background:var(--accent);}
.sc-teal::before{background:var(--accent2);}
.sc-green::before{background:var(--green);}
.sc-blue::before{background:#3b82f6;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:7px;}
.stat-val{font-size:22px;font-weight:700;}
.pbar{height:3px;background:var(--border);border-radius:2px;width:60px;display:inline-block;vertical-align:middle;margin-left:5px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.search-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.sort-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.sort-btn.on{border-color:var(--accent);color:var(--accent);}
.night-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;background:rgba(20,184,166,.12);border:1px solid rgba(20,184,166,.25);color:var(--accent2);font-size:12px;font-weight:600;}
.pred-section{background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.25);border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.pred-title{font-size:11px;font-weight:700;color:rgba(240,165,0,.7);margin-bottom:8px;letter-spacing:.05em;}
.pred-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(240,165,0,.1);}
.pred-row:last-child{border-bottom:none;}
.pred-time{font-size:12px;font-weight:700;color:var(--accent);min-width:42px;}
.pred-name{font-size:13px;font-weight:600;flex:1;}
.pred-add{padding:4px 10px;border-radius:6px;background:rgba(34,197,94,.15);border:1px solid var(--green);color:var(--green);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.pred-add:hover{background:rgba(34,197,94,.3);}
.pred-skip{padding:4px 10px;border-radius:6px;background:rgba(239,68,68,.1);border:1px solid var(--red);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.pred-skip:hover{background:rgba(239,68,68,.2);}
.boss-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.round-boss{font-weight:700;font-size:11px;color:var(--accent);}
.round-time{font-size:10px;color:var(--text2);}
.round-del{display:block;margin-top:3px;background:none;border:none;color:var(--red);font-size:10px;cursor:pointer;opacity:.6;}
.round-del:hover{opacity:1;}
.att-sel{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);padding:4px 6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;min-width:78px;}
.att-sel.join{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green);}
.att-sel.late{background:rgba(234,179,8,.1);border-color:var(--yellow);color:var(--yellow);}
.att-sel.miss{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red);}
.night-mark{font-size:10px;color:var(--accent2);}
@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .content{padding-bottom:100px!important;}
  /* 모바일 보스 카드 */
  .boss-card-mobile{display:block;}
  .boss-table-pc{display:none;}
  /* 모바일 대시보드 테이블 */
  .dash-table-wrap{overflow-x:auto;}
  .dash-table-wrap table th:nth-child(3),
  .dash-table-wrap table td:nth-child(3),
  .dash-table-wrap table th:nth-child(6),
  .dash-table-wrap table td:nth-child(6),
  .dash-table-wrap table th:nth-child(7),
  .dash-table-wrap table td:nth-child(7){display:none;}
}
@media(min-width:769px){
  .boss-card-mobile{display:none;}
  .boss-table-pc{display:block;}
}
.boss-round-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.boss-round-title{padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.boss-round-name{font-size:14px;font-weight:700;color:var(--accent);}
.boss-round-time{font-size:11px;color:var(--text2);}
.member-att-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(30,45,69,.4);}
.member-att-name{font-size:14px;font-weight:600;}
.member-att-pts{font-size:12px;color:var(--accent);margin-left:6px;}
.att-btns{display:flex;gap:6px;}
.att-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.att-btn-join{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.att-btn-join.on{background:var(--green);color:#000;}
.att-btn-late{background:rgba(234,179,8,.1);color:var(--yellow);border:1px solid rgba(234,179,8,.3);}
.att-btn-late.on{background:var(--yellow);color:#000;}
.att-btn-miss{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.att-btn-miss.on{background:var(--red);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="sb-ov" id="sbOv" onclick="closeSb()"></div>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="ham" onclick="toggleSb()">☰</button>
        <div class="topbar-title" id="pageTitle">대시보드</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="night-badge" id="nightBadge" style="display:none">🌙 새벽 +20%</div>
        <button class="btn btn-s btn-sm" onclick="exportData()">💾 백업</button>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('dash',this)">🏠 길드원 현황</div>
      <div class="tab" onclick="switchTab('boss',this)">⚔️ 보스 포인트</div>
      <div class="tab" onclick="switchTab('history',this)">📊 주간 기록</div>
    </div>
    <div style="background:rgba(239,68,68,.1);border-bottom:1px solid rgba(239,68,68,.25);padding:7px 20px;font-size:12px;color:#f87171;display:flex;align-items:center;gap:6px;flex-shrink:0">
      ⚠️ 보스 회차 추가 후 <strong style="color:#ef4444">1시간 뒤 자동 잠금</strong> · 참여 변경 내역은 로그에 기록됩니다
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- 모달: 길드원 추가/수정 -->
<div class="modal-ov" id="modal-member">
  <div class="modal">
    <div class="modal-title" id="memberModalTitle">👤 길드원 추가</div>
    <input type="hidden" id="m-id">
    <div class="fg"><label>닉네임</label><input class="inp" type="text" id="m-nick" placeholder="예: 홍길동"></div>
    <div class="fg"><label>전투력</label><input class="inp" type="number" id="m-power" placeholder="예: 230000"></div>

    <div class="fg"><label>전문화 레벨</label><input class="inp" type="number" id="m-spec" placeholder="예: 150"></div>
    <div class="fg"><label>장비 레벨</label><input class="inp" type="number" id="m-itemlv" placeholder="예: 1200"></div>
    <div class="modal-footer">
      <button class="btn btn-s" onclick="closeModal('member')">취소</button>
      <button class="btn btn-p" onclick="saveMember()">저장하기</button>
    </div>
  </div>
</div>


<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script>
document.getElementById('commonStyle').textContent = COMMON_CSS;
const DISCORD_WEBHOOKS = {
  1: null,
  2: null,
  3: null,
  4: null,
  5: 'https://discord.com/api/webhooks/1500660643395534979/6Uc_Byj8zFzCaVycBDbFKEEjdemMejl2XnqwBAb0UYQclL0sLqxw9g-w9WC_WsH-SqQJ',
};
let sess, members=[], bosses=[], attend={}, sortDir='desc', curTab='dash', searchQ='';

window.addEventListener('load', () => {
  sess = requireLogin();
  if (!sess) return;
  initFirebase();
  watchServerName();
  loadData();
  updateNightBadge();
  setInterval(updateNightBadge, 60000);
  setInterval(checkAutoSave, 60000); // 1분마다 자동저장 체크
  // URL 파라미터로 보스탭 자동 전환
  const urlTab = new URLSearchParams(location.search).get('tab');
  if (urlTab === 'boss') {
    renderSidebar('boss');
    curTab = 'boss';
    document.querySelector('.tab:nth-child(1)').classList.remove('active');
    document.querySelector('.tab:nth-child(2)').classList.add('active');
    document.getElementById('pageTitle').textContent = '보스 포인트';
    renderBoss();
  } else {
    renderSidebar('dashboard');
    renderDash();
  }
});

function loadData() {
  // 로컬 우선 로드 (빠른 초기 렌더)
  members = getData('members', []);
  bosses = getData('bosses', DEFAULT_BOSSES);
  attend = getData('attend', {});

  // Firebase 실시간 동기화
  // members는 실시간 리스너 대신 주기적으로 확인 (덮어쓰기 방지)
  setInterval(() => {
    fbGet('members', data => {
      if (!data) return;
      const fbMembers = Array.isArray(data) ? data : Object.values(data);
      if (fbMembers.length > 0 && JSON.stringify(fbMembers.map(m=>m.id).sort()) !== JSON.stringify(members.map(m=>m.id).sort())) {
        members = fbMembers;
        setData('members', members);
        if (curTab==='dash') renderDash();
      }
    });
  }, 10000); // 10초마다 체크

  fbListen('bosses', data => {
    if (data) { bosses = Array.isArray(data) ? data : Object.values(data); setData('bosses', bosses); }
    else { bosses = DEFAULT_BOSSES; }
  });

  fbListen('eqData', data => {
    if (data) {
      setData('eqData', data);
      if (curTab==='dash') renderDash();
      // 다른 탭이면 무시
    }
  });
  fbListen('attend', data => {
    const newAttend = data || {};
    if (JSON.stringify(newAttend) !== JSON.stringify(attend)) {
      attend = newAttend;
      setData('attend', attend);
      if (curTab==='dash') renderDash();
      else if (curTab==='boss') renderBoss();
      // history 탭이면 아무것도 안함
    }
  });
}

function updateNightBadge() {
  document.getElementById('nightBadge').style.display = isNightBonus() ? 'inline-flex' : 'none';
}

function switchTab(tab, el) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if (el && el.classList) el.classList.add('active');
  const titles = {dash:'길드원 현황', boss:'보스 포인트', history:'📊 주간 기록'};
  document.getElementById('pageTitle').textContent = titles[tab]||'대시보드';
  renderSidebar(tab==='boss'?'boss':'dashboard');
  if(tab==='dash') renderDash();
  else if(tab==='boss') renderBoss();
  else renderHistory();
}

// ===== 대시보드 =====
function renderDash() {
  const admin = isAdmin();
  const eqDataLocal = getData('eqData',{});
  const mPts = members.map(m=>{
    const eq = eqDataLocal[m.id]||{};
    return {
      ...m,
      spec: eq.spec !== undefined ? eq.spec : m.spec,
      itemLv: eq.itemLv !== undefined ? eq.itemLv : m.itemLv,
      pts: calcPoints(m.id),
      rate: calcRate(m.id)
    };
  });
  const sorted = [...mPts].sort((a,b)=>sortDir==='desc'?b.power-a.power:a.power-b.power);
  const byPts = [...mPts].sort((a,b)=>b.pts-a.pts);
  const maxP = members.length ? Math.max(...members.map(m=>m.power)) : 1;
  const avgP = members.length ? Math.round(members.reduce((s,m)=>s+m.power,0)/members.length) : 0;
  const filtered = sorted.filter(m=>m.nick.toLowerCase().includes(searchQ.toLowerCase()));
  const rounds = countRounds();

  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card sc-gold"><div class="stat-label">총 길드원</div><div class="stat-val">${members.length}<span style="font-size:14px;color:var(--text2)"> 명</span></div></div>
      <div class="stat-card sc-teal"><div class="stat-label">평균 전투력</div><div class="stat-val" style="font-size:18px">${avgP.toLocaleString()}</div></div>
      <div class="stat-card sc-green"><div class="stat-label">최고 전투력</div><div class="stat-val" style="font-size:18px">${maxP.toLocaleString()}</div></div>
      <div class="stat-card sc-blue"><div class="stat-label">이번주 보스 회차</div><div class="stat-val">${rounds}<span style="font-size:14px;color:var(--text2)"> 회</span></div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">멤버 목록</div>
        <div class="search-row">
          ${admin?`<button class="btn btn-p btn-sm" onclick="openAddMember()">👤 추가</button>`:''}
          <input class="inp" type="text" placeholder="검색..." value="${searchQ}" oninput="searchQ=this.value;renderDash()" style="width:120px;padding:5px 10px;">
          <button class="sort-btn ${sortDir==='desc'?'on':''}" onclick="setSort('desc')">🔽 높은순</button>
          <button class="sort-btn ${sortDir==='asc'?'on':''}" onclick="setSort('asc')">🔼 낮은순</button>
        </div>
      </div>
      <div class="dash-table-wrap" style="overflow-x:auto">
        <table>
          <thead><tr>
            <th class="tl">순위</th><th class="tl">닉네임</th><th>전투력</th>
            <th>이번주 포인트</th><th>포인트 순위</th><th>참여율</th>
            <th>전문화</th><th>장비기록포인트</th>
            ${admin?'<th>관리</th>':''}
          </tr></thead>
          <tbody>
            ${filtered.map((m,i)=>{
              const pr = byPts.findIndex(x=>x.id===m.id)+1;
              const prB = pr===1?`<span class="badge b-gold">🏆 1위</span>`:pr===2?`<span class="badge b-silver">🥈 2위</span>`:pr===3?`<span class="badge b-bronze">🥉 3위</span>`:`<span style="color:var(--text2)">${pr}위</span>`;
              const pct = Math.round((m.power/maxP)*100);
              return `<tr>
                <td class="tl" style="color:var(--text2);font-weight:600">${i+1}</td>
                <td class="tl" style="font-weight:600">${m.nick}</td>
                <td>${m.power.toLocaleString()}<div class="pbar"><div class="pfill" style="width:${pct}%"></div></div></td>
                <td><span style="color:var(--accent);font-weight:700;font-size:14px">${m.pts.toFixed(1)}</span></td>
                <td>${prB}</td>
                <td style="color:var(--accent2)">${m.rate.toFixed(1)}%</td>
                <td>${m.spec>0?m.spec:'-'}</td>
                <td>${m.itemLv>0?m.itemLv:'-'}</td>
                ${admin?`<td style="display:flex;gap:4px"><button class="btn btn-s btn-sm" onclick="openEditMember(${m.id})">✏️</button><button class="btn btn-d btn-sm" onclick="delMember(${m.id})">🗑️</button></td>`:''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function setSort(d){sortDir=d;renderDash();}

function calcPoints(mid) {
  const wk=getWeekKey(), wkData=attend[wk]||{};
  let t=0;
  for(const bn in wkData) for(const rk in wkData[bn]){
    const r=wkData[bn][rk], b=bosses.find(x=>x.name===bn);
    const pts=b?b.pts:1, bonus=r.nightBonus?1.2:1;
    const st=r.attendance?.[mid];
    if(st==='참여') t+=pts*bonus;
    else if(st==='늦참') t+=pts*0.5*bonus;
  }
  return Math.round(t*10)/10;
}

function calcRate(mid) {
  const wk=getWeekKey(), wkData=attend[wk]||{};
  let total=0, joined=0;
  for(const bn in wkData) for(const rk in wkData[bn]){
    total++;
    const st=wkData[bn][rk].attendance?.[mid];
    if(st==='참여'||st==='늦참') joined++;
  }
  return total>0?Math.round((joined/total)*1000)/10:0;
}

function countRounds(){
  const wk=getWeekKey(), wkData=attend[wk]||{};
  let c=0;
  for(const bn in wkData) c+=Object.keys(wkData[bn]).length;
  return c;
}

// ===== 보스 =====
let selBoss='';

// ===== 자음 그룹핑 =====
function getJamo(name) {
  const code = name.charCodeAt(0) - 0xAC00;
  if(code < 0) return name[0];
  const idx = Math.floor(code / 28 / 21);
  return ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][idx]||name[0];
}

function getStars(pts) {
  if(pts >= 4) return '⭐⭐⭐⭐ ';
  if(pts >= 3) return '⭐⭐⭐ ';
  if(pts >= 2) return '⭐⭐ ';
  if(pts >= 1.5) return '⭐✨ ';
  if(pts >= 1.2) return '⭐· ';
  return '⭐ ';
}

function getMoonSun() {
  const h = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'})).getHours();
  return h >= 12 ? '🌙 ' : '';
}

function groupBossByJamo(bosses) {
  const moon = getMoonSun();
  // 오프런 맨 위 별도 처리
  const offrun = bosses.find(b=>b.name.includes('오프런'));
  const rest = bosses.filter(b=>!b.name.includes('오프런'));

  const groups = {};
  rest.forEach(b => {
    const j = getJamo(b.name);
    if(!groups[j]) groups[j] = [];
    groups[j].push(b);
  });

  // 각 그룹 안에서 pts 내림차순 정렬
  Object.values(groups).forEach(list => list.sort((a,b)=>b.pts-a.pts));

  const offrunHtml = offrun
    ? `<option value="${offrun.name}" style="color:#ef4444;font-weight:700">🔴 오프런 25pt</option>`
    : '';

  const groupHtml = Object.entries(groups).map(([j, list]) =>
    `<optgroup label="${j}">${list.map(b=>`<option value="${b.name}">${moon}${getStars(b.pts)}${b.name} (${b.pts}pt)</option>`).join('')}</optgroup>`
  ).join('');

  return offrunHtml + groupHtml;
}

// ===== 예상 보스 =====

function getLastKillTime(bossName) {
  // attend 데이터에서 해당 보스의 가장 최근 회차 시간을 실시간으로 읽음
  // 항상 최신 attend 데이터 사용 (캐시 없음)
  const currentAttend = getData('attend', {});
  let lastTime = 0;
  Object.values(currentAttend).forEach(wkData => {
    const bossRounds = wkData[bossName];
    if(!bossRounds) return;
    Object.values(bossRounds).forEach(round => {
      const t = round.time || parseInt(Object.keys(bossRounds).find(k=>bossRounds[k]===round)||0);
      if(t > lastTime) lastTime = t;
    });
  });
  return lastTime || null;
}

function getNextSpawn(boss) {
  const sp = boss.spawn;
  if(!sp) return null;
  const now = Date.now();

  if(sp.type === 'fixed') {
    // 고정 보스: KST 기준 다음 출현 시간 계산
    // KST = UTC+9, 한국 날짜/시간 기준
    const KST_OFFSET = 9 * 60 * 60 * 1000;
    const nowKst = new Date(now + KST_OFFSET); // KST 현재 시간 (UTC 기준 Date 객체)
    const candidates = [];
    for(let dayOffset = 0; dayOffset <= 7; dayOffset++) {
      // KST 기준 날짜
      const kstDay = new Date(nowKst.getTime() + dayOffset * 86400000);
      const dow = kstDay.getUTCDay(); // KST 요일
      if(sp.days.includes(dow)) {
        // KST 기준 목표 시간 (UTC로 저장)
        const spawnUtcMs = Date.UTC(
          kstDay.getUTCFullYear(),
          kstDay.getUTCMonth(),
          kstDay.getUTCDate(),
          sp.hour - 9, // KST → UTC (9시간 빼기)
          sp.min, 0, 0
        );
        if(spawnUtcMs > now - 10*60*1000) {
          candidates.push(spawnUtcMs);
        }
      }
    }
    if(candidates.length === 0) return null;
    return Math.min(...candidates);
  } else {
    // 리젠 보스: attend에서 마지막 회차 시간 읽어서 계산
    const lastKill = getLastKillTime(boss.name);
    if(!lastKill) return null;
    const nextSpawn = lastKill + sp.hours * 60 * 60 * 1000;
    return nextSpawn;
  }
}

function renderPredBosses() {
  // 모든 길드원 표시 (추가는 누구나 가능)
  const now = Date.now();
  const SHOW_BEFORE = 5 * 60 * 1000;  // 5분 전
  const HIDE_AFTER  = 10 * 60 * 1000; // 10분 후

  // Firebase 보스에 spawn 정보 없을 수 있으니 DEFAULT_BOSSES에서 매핑
  const fbBosses = getData('bosses', DEFAULT_BOSSES);
  const bosses = fbBosses.map(b => {
    const def = DEFAULT_BOSSES.find(d=>d.name===b.name);
    return def ? {...b, spawn: def.spawn} : b;
  });
  const preds = [];

  const skipped = getData('skippedPreds', {});
  // 오래된 skipped 정리 (1시간 지나면 삭제)
  Object.keys(skipped).forEach(k => {
    if(Date.now() - skipped[k] > 60*60*1000) delete skipped[k];
  });

  bosses.forEach(b => {
    const spawnMs = getNextSpawn(b);
    if(!spawnMs) return;
    const diff = spawnMs - now;
    if(diff <= SHOW_BEFORE && diff >= -HIDE_AFTER) {
      // skipped 체크
      const skipKey = b.name + '_' + spawnMs;
      if(!skipped[skipKey]) preds.push({boss:b, spawnMs, diff});
    }
  });

  if(preds.length === 0) return '';

  // 시간순 정렬, 최대 5개
  preds.sort((a,b) => a.spawnMs - b.spawnMs);
  const top5 = preds.slice(0, 5);

  const rows = top5.map(p => {
    const kstDate = new Date(p.spawnMs + 9*60*60*1000);
    const hh = String(kstDate.getUTCHours()).padStart(2,'0');
    const mm = String(kstDate.getUTCMinutes()).padStart(2,'0');
    const diffMin = Math.round(p.diff / 60000);
    const diffTxt = diffMin >= 0 ? `${diffMin}분 후` : `${Math.abs(diffMin)}분 경과`;
    const isFixed = p.boss.spawn?.type === 'fixed';
    return `<div class="pred-row">
      <div class="pred-time">${hh}:${mm}</div>
      <div class="pred-name">${isFixed?'📌':'🔄'} ${p.boss.name}</div>
      <span style="font-size:11px;color:var(--text2);margin-right:4px">${diffTxt}</span>
      <button class="pred-add" onclick="addRoundFromPred('${p.boss.name}',${p.spawnMs},${isFixed})">추가</button>
      <button class="pred-skip" onclick="skipPred('${p.boss.name}',${p.spawnMs})">미추가</button>
    </div>`;
  }).join('');

  return `<div class="pred-section">
    <div class="pred-title">⏰ 예상 보스 (출현 5분 전 ~ 10분 후 자동표시)</div>
    ${rows}
  </div>`;
}

  if(!bn){showToast('보스를 선택해주세요','error');return;}
  const wk=getWeekKey();
  // 최신 데이터 다시 로드
  attend=getData('attend',{});
  if(!attend[wk]) attend[wk]={};
  if(!attend[wk][bn]) attend[wk][bn]={};
  const rk=Date.now().toString();
  // 모든 길드원 미참으로 기본 설정
  const defaultAtt = {};
  members.forEach(m => { defaultAtt[m.id] = '미참'; });
  attend[wk][bn][rk]={time:Date.now(),nightBonus:isNightBonus(),attendance:defaultAtt,addedBy:sess?.serverName||'길드원'};
  setData('attend',attend);
  fbSet('attend', attend);
  // 리젠 보스 시간은 attend에서 자동으로 읽음

function isLocked(rk) {
  const ts = parseInt(rk);
  if(!ts || isNaN(ts) || ts < 1000000000000) return false; // 타임스탬프 아니면 잠금 안함
  return Date.now() - ts > 3600000; // 1시간
}

function setAtt(bn,rk,mid,st) {
  if(isLocked(rk) && !isAdmin()) { showToast('1시간이 지나 잠금됐습니다','error'); return; }
  const wk=getWeekKey();
  if(!attend[wk]?.[bn]?.[rk]) return;
  if(!attend[wk][bn][rk].attendance) attend[wk][bn][rk].attendance={};
  if(st==='') delete attend[wk][bn][rk].attendance[mid];
  else attend[wk][bn][rk].attendance[mid]=st;
  setData('attend',attend);
  // 해당 길드원 참여값만 업데이트 (전체 덮어쓰기 방지)
  if(firebaseDB) {
    const path=`servers/server${getSession()?.serverId}/${getWeekKey()}/${bn}/${rk}/attendance/${mid}`;
    if(st==='') firebaseDB.ref(`servers/server${getSession()?.serverId}/attend/${wk}/${bn}/${rk}/attendance/${mid}`).remove();
    else firebaseDB.ref(`servers/server${getSession()?.serverId}/attend/${wk}/${bn}/${rk}/attendance/${mid}`).set(st);
  }
  // 포인트 셀 업데이트
  const pts=calcPoints(mid);
  const rows=document.querySelectorAll('#bossTable tbody tr');
  const sm=[...members].sort((a,b)=>a.nick.localeCompare(b.nick,'ko'));
  const idx=sm.findIndex(m=>m.id===mid);
  if(rows[idx]) rows[idx].querySelectorAll('td')[3].innerHTML=`<span style="color:var(--accent);font-weight:700">${pts.toFixed(1)}</span>`;
}

function delRound(bn,rk) {
  if(!confirm(`${bn} 회차 삭제?`)) return;
  const wk=getWeekKey();
  delete attend[wk]?.[bn]?.[rk];
  setData('attend',attend);
  fbSet('attend',attend);
  addBossLog('삭제', bn, rk);
  renderBoss();
}

function checkAutoSave() {
  const now = new Date();
  const day = now.getDay(); // 0=일요일
  const h = now.getHours();
  const m = now.getMinutes();
  // 일요일 23:50~23:58 사이에 자동 저장
  if (day===0 && h===23 && m>=50 && m<=58) {
    const wk = getWeekKey();
    const history = getData('weeklyHistory', {});
    if (!history[wk]) {
      saveWeeklyHistory();
    }
  }
}

      </div>
    ` : weeks.map(wk => {
      const rec = history[wk];
      const date = `${wk.slice(0,4)}년 ${parseInt(wk.slice(4,6))}월 ${parseInt(wk.slice(6,8))}일 주`;
      return `
        <div class="card" style="margin-bottom:14px">
          <div class="card-head">
            <div class="card-title">📅 ${date}</div>
            <div style="font-size:11px;color:var(--text2)">${fmtDT(rec.savedAt)} 저장</div>
          </div>
          <div style="overflow-x:auto">
            <table>
              <thead><tr>
                <th class="tl">순위</th>
                <th class="tl">닉네임</th>
                <th>포인트</th>
                <th>참여율</th>
                <th>전투력</th>
              </tr></thead>
              <tbody>
                ${rec.rankings.map((m,i)=>{
                  const badge = i===0?'<span class="badge b-gold">🏆 1위</span>':
                               i===1?'<span class="badge b-silver">🥈 2위</span>':
                               i===2?'<span class="badge b-bronze">🥉 3위</span>':
                               `<span style="color:var(--text2)">${i+1}위</span>`;
                  return `<tr>
                    <td class="tl">${badge}</td>
                    <td class="tl" style="font-weight:600">${m.nick}</td>
                    <td style="color:var(--accent);font-weight:700">${m.pts.toFixed(1)}</td>
                    <td style="color:var(--accent2)">${m.rate.toFixed(1)}%</td>
                    <td>${m.power.toLocaleString()}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
    }).join('')}
  `;

  // Firebase에서도 로드 (탭 체크 추가)
  fbGet('weeklyHistory', data => {
    if (data && curTab==='history') {
      setData('weeklyHistory', data);
      renderHistory();
    }
  });
}

// ===== 디스코드 웹훅 =====
async function sendDiscord(bossName) {
  const sess = getSession();
  const webhook = DISCORD_WEBHOOKS[sess?.serverId];
  if (!webhook) return; // 웹훅 없는 서버는 스킵
  const sname = getServerName();
  const siteUrl = location.origin;
  try {
    await fetch(webhook, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        embeds: [{
          title: `⚔️ ${bossName} 출현!`,
          description: `**${sname}** 보스가 등록되었습니다.\n참여 체크를 해주세요!`,
          color: 0xf0a500,
          fields: [{
            name: '📍 참여 체크',
            value: `[클릭해서 바로 이동](https://ajtwlsdydrkfl2-cyber.github.io/guild-manager/dashboard.html?tab=boss)`
          }],
          footer: {text: '길드 매니저 알림'},
          timestamp: new Date().toISOString()
        }]
      })
    });
  } catch(e) {
    console.log('디스코드 알림 실패:', e);
  }
}

// ===== 백업 =====
function exportData(){
  const data={members,bosses,attend};
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`guild_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast('백업 다운로드!','success');
}
